# --- Service 1: The Main Order API ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-fastapi-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: simple-fastapi-app
  template:
    metadata:
      labels:
        app: simple-fastapi-app
    spec:
      containers:
      - name: fastapi
        image: saikishore29/simple-fastapi-app:9f0ca768
        ports:
        - containerPort: 8000
